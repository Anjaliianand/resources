<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Prediction Result</title>
  </head>
  <body>
    <h1>Prediction</h1>
    <p>Class index: {{ prediction }}</p>
    {% if label %}
    <p><strong>Label:</strong> {{ label }}</p>
    {% endif %}
    {% if image_path %}
    <img src="/{{ image_path }}" alt="Uploaded Image" style="max-width:400px;">
    {% endif %}
    <p><a href="/">Try another</a></p>
  </body>
</html>
